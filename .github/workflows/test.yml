name: Host Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc make curl python3

      - name: Download Unity and run tests
        run: make -C Firmware/test/

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: Firmware/test/build/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test result artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: Firmware/test/build/*.xml
          retention-days: 30
